name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Contracts (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soroban-delegation
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo test

  sdk:
    name: SDK (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wolf1276/kairos-sdk build
      - run: pnpm --filter @wolf1276/kairos-sdk test

  app:
    name: App (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wolf1276/kairos-sdk build
      - run: pnpm --filter app build
      - name: Lint
        working-directory: app
        run: pnpm eslint . --ext .ts,.tsx --max-warnings 10
      - name: Test
        working-directory: app
        run: pnpm vitest run

  json-validity:
    name: JSON validity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for f in $(find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.next/*"); do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null || exit 1
          done
          echo "All JSON files valid."
